<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Digimon Terminus</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0c18;
               cursor: default; user-select: none; -webkit-user-select: none; }
  .bg   { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; }
  /* cyan scanline drift over the art */
  .scan { position: absolute; inset: 0; pointer-events: none;
          background: linear-gradient(180deg, transparent 0%, rgba(0,212,255,.05) 50%, transparent 100%);
          background-size: 100% 8px; animation: scan 9s linear infinite; }
  @keyframes scan { from { background-position-y: 0; } to { background-position-y: 429px; } }
  /* gold-cyan energy line above the status bar */
  .glow { position: absolute; left: 0; right: 0; bottom: 46px; height: 2px;
          background: linear-gradient(90deg, transparent, #00d4ff, #c8a84b, transparent);
          animation: pulse 3s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: .25; } 50% { opacity: .85; } }
</style>
</head>
<body>
  <img class="bg" src="background.gif" alt="">
  <div class="scan"></div>
  <div class="glow"></div>
  <script>
    // forward left-mouse drag to the native window (HtmlPanel WebMessageReceived)
    addEventListener('mousedown', function (e) {
      if (e.button === 0 && window.chrome && window.chrome.webview)
        window.chrome.webview.postMessage('drag');
    });
  </script>
</body>
</html>
